# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.local.yml — Full local dev stack
#
# Starts every service you need to run the app locally:
#   redis, backend API, WebSocket server, frontend (FrontendV2 via nginx),
#   and all six realtime microservices.
#
# Usage (from the repo root):
#   docker compose -f docker-compose.local.yml up --build
#
# Then open:
#   Frontend  →  http://localhost:5173
#   Backend   →  http://localhost:8000
#   WS server →  ws://localhost:8765
#   pgAdmin   →  http://localhost:5050  (admin@local.dev / admin)
#
# Env vars you MUST supply (create a .env file at the repo root or export them):
#   DATABASE_URL   — set to the local postgres URL below for fully local dev:
#                    postgresql://dev:devpassword@postgres:5432/cryptorating
#   REDIS_URL      — overridden internally to redis://redis:6379
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Postgres 16 (local dev database) ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cryptorating-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       cryptorating
      POSTGRES_USER:     dev
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init_local.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d cryptorating"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── pgAdmin 4 ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cryptorating-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend Flask API ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-postgresql://dev:devpassword@postgres:5432/cryptorating}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── WebSocket broadcast server ──────────────────────────────────────────────
  ws:
    build:
      context: ./ws
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (FrontendV2 — production build served by nginx) ──────────────
  frontend:
    build:
      context: .
      dockerfile: Frontend-User-interfaces/FrontendV2/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
        VITE_WS_URL: ws://localhost:8765
    ports:
      - "5173:80"
    depends_on:
      - backend
      - ws
    restart: unless-stopped

  # ── Realtime: collectors-primary (live ticker prices) ──────────────────────
  collectors-primary:
    build:
      context: .
      dockerfile: realtime/collectors-primary/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - STREAM_TRADES_KEY=stream:trades
      - LOG_LEVEL=INFO
      - HEALTH_PORT=8081
    ports:
      - "8081:8081"
    restart: unless-stopped

  # ── Realtime: collectors-secondary ─────────────────────────────────────────
  collectors-secondary:
    build:
      context: .
      dockerfile: realtime/collectors-secondary/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - STREAM_TRADES_KEY=stream:trades
      - LOG_LEVEL=INFO
      - HEALTH_PORT=8082
    ports:
      - "8082:8082"
    restart: unless-stopped

  # ── Realtime: live-price-ingestor ──────────────────────────────────────────
  live-price-ingestor:
    build:
      context: .
      dockerfile: realtime/live-price-ingestor/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - STREAM_TRADES_KEY=stream:trades
      - LOG_LEVEL=INFO
      - HEALTH_PORT=8083
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_IPV4=${DATABASE_URL_IPV4}
    ports:
      - "8083:8083"
    restart: unless-stopped

  # ── Realtime: trade-collectors-primary (volume trades) ─────────────────────
  trade-collectors-primary:
    build:
      context: .
      dockerfile: realtime/trade-collectors-primary/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - STREAM_KEY=stream:trades:volume
      - LOG_LEVEL=INFO
      - HEALTH_PORT=8084
    ports:
      - "8084:8084"
    restart: unless-stopped

  # ── Realtime: trade-collectors-secondary ───────────────────────────────────
  trade-collectors-secondary:
    build:
      context: .
      dockerfile: realtime/trade-collectors-secondary/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - STREAM_KEY=stream:trades:volume
      - LOG_LEVEL=INFO
      - HEALTH_PORT=8085
    ports:
      - "8085:8085"
    restart: unless-stopped

  # ── Realtime: volume-aggregator ────────────────────────────────────────────
  volume-aggregator:
    build:
      context: .
      dockerfile: realtime/volume-aggregator/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - VOLUME_STREAM_KEY=stream:trades:volume
      - LOG_LEVEL=INFO
      - HEALTH_PORT=8086
    ports:
      - "8086:8086"
    restart: unless-stopped

  # ── Realtime: candle-aggregator ───────────────────────────────────────────
  candle-aggregator:
    build:
      context: .
      dockerfile: realtime/candle-aggregator/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_IPV4=${DATABASE_URL_IPV4}
      - RUN_INTERVAL_MINUTES=60
      - LOG_LEVEL=INFO
    restart: unless-stopped

  # ── Rating Score Orchestrator ─────────────────────────────────────────────
  rating-orchestrator:
    build:
      context: ./rating
      dockerfile: score-orchestrator/Dockerfile
    volumes:
      - ./data:/rating/data:ro
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dev:devpassword@postgres:5432/cryptorating}
      - REDIS_URL=redis://redis:6379
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - COVALENT_API_KEY=${COVALENT_API_KEY:-}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - SERPAPI_KEY=${SERPAPI_KEY:-}
      - RATED_API_KEY=${RATED_API_KEY:-}
      - REDIS_TTL=691200
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Market Data Collector (refreshes market_data every 6 h) ─────────────────
  market-collector:
    build:
      context: .
      dockerfile: collectors/market/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dev:devpassword@postgres:5432/cryptorating}
      - REDIS_URL=redis://redis:6379
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
      - MARKET_RUN_INTERVAL=21600
      - MARKET_REQUEST_DELAY=1.5
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── News Collector (refreshes news_cache every 2 h) ──────────────────────
  news-collector:
    build:
      context: .
      dockerfile: collectors/news/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dev:devpassword@postgres:5432/cryptorating}
      - REDIS_URL=redis://redis:6379
      - NEWS_RUN_INTERVAL=7200
      - NEWS_REQUEST_DELAY=2.0
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  pgadmin-data:
