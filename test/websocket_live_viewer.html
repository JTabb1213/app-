<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kraken Live Ticker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    padding: 20px;
  }
  h1 { color: #00ff88; margin-bottom: 4px; font-size: 1.4em; }
  #subtitle { color: #555; font-size: 0.78em; margin-bottom: 14px; }
  #stats {
    color: #888;
    font-size: 0.85em;
    margin-bottom: 16px;
    display: flex;
    gap: 24px;
  }
  #stats span { color: #ccc; }
  .tabs { display: flex; gap: 0; margin-bottom: 0; }
  .tab {
    padding: 5px 18px;
    cursor: pointer;
    font-size: 0.82em;
    border: 1px solid #222;
    border-bottom: none;
    color: #555;
    background: #111;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .tab.active { color: #00ff88; background: #0d0d0d; border-color: #333; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
  th {
    text-align: left;
    padding: 6px 10px;
    color: #555;
    border-bottom: 1px solid #222;
    font-weight: normal;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  td { padding: 4px 10px; border-bottom: 1px solid #141414; }
  .pair   { color: #88aaff; }
  .bid    { color: #ff4455; }
  .ask    { color: #00ff88; }
  .mid    { color: #ffffff; font-weight: bold; }
  .last   { color: #aaaaaa; }
  .spread { color: #555; }
  .buy    { color: #00ff88; font-weight: bold; }
  .sell   { color: #ff4455; font-weight: bold; }
  .notional { color: #aaaaaa; }
  .whale-row td { background: rgba(255, 200, 0, 0.07); }
  .whale-row td.pair { color: #ffd700; font-weight: bold; }
  .whale-badge { color: #ffd700; font-size: 0.9em; margin-left: 4px; }
  tr:hover td { background: #161616; }
  #stream-view { display: none; }
  .stream-controls { display: flex; gap: 12px; align-items: center; padding: 6px 0 8px 0; font-size: 0.8em; color: #555; }
  .stream-controls label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .stream-controls input { accent-color: #ffd700; cursor: pointer; }
</style>
</head>
<body>

<h1>⚡ Kraken Live Ticker</h1>
<div id="subtitle">ticker channel — fires on every bid/ask change, not just executed trades</div>
<div id="stats">
  <div>Quote updates: <span id="count">—</span></div>
  <div>Trades: <span id="trade-count">—</span></div>
  <div>Connections: <span id="conns">—</span></div>
  <div>Pairs active: <span id="pairs">—</span></div>
  <div>Changed this poll: <span id="changed">—</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('snapshot')">Snapshot</div>
  <div class="tab" onclick="showTab('stream')">Live Stream</div>
</div>

<!-- Snapshot: latest bid/ask/mid for every pair -->
<div id="snapshot-view">
  <table>
    <thead>
      <tr>
        <th>Pair</th>
        <th>Bid</th>
        <th>Ask</th>
        <th>Mid</th>
        <th>Last Trade</th>
        <th>Spread %</th>
      </tr>
    </thead>
    <tbody id="snapshot"></tbody>
  </table>
</div>

<!-- Stream: rolling feed of executed trades with buy/sell pressure + whale flags -->
<div id="stream-view">
  <div class="stream-controls">
    <label><input type="checkbox" id="whale-only"> 🐋 Whale trades only (&gt;$50k)</label>
  </div>
  <table>
    <thead>
      <tr>
        <th>Pair</th>
        <th>Side</th>
        <th>Price</th>
        <th>Volume</th>
        <th>Notional (USD)</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="stream"></tbody>
  </table>
</div>

<script>
let activeTab = "snapshot";
let clientSeq  = 0;        // last seq seen from the server
let localPrices = {};      // merged full snapshot, built up from deltas

function showTab(tab) {
  activeTab = tab;
  document.getElementById("snapshot-view").style.display = tab === "snapshot" ? "block" : "none";
  document.getElementById("stream-view").style.display   = tab === "stream"   ? "block" : "none";
  document.querySelectorAll(".tab").forEach((el, i) => {
    el.classList.toggle("active", (i === 0 && tab === "snapshot") || (i === 1 && tab === "stream"));
  });
}

function fmt(n) {
  if (n == null) return "—";
  const f = parseFloat(n);
  if (f >= 1)   return "$" + f.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return "$" + f.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 8 });
}

function fmtNotional(n) {
  if (n == null) return "—";
  const f = parseFloat(n);
  if (f >= 1_000_000) return "$" + (f / 1_000_000).toFixed(2) + "M";
  if (f >= 1_000)     return "$" + (f / 1_000).toFixed(1) + "k";
  return "$" + f.toFixed(2);
}

async function poll() {
  try {
    const whaleOnly = document.getElementById("whale-only")?.checked ? "1" : "0";

    const [updRes, priceRes, tradeRes] = await Promise.all([
      fetch("/api/updates"),
      fetch(`/api/prices?since=${clientSeq}`),
      fetch(`/api/trades?whale=${whaleOnly}`),
    ]);
    const updData   = await updRes.json();
    const priceData = await priceRes.json();
    const tradeData = await tradeRes.json();

    // Advance seq cursor and merge price delta into local copy
    clientSeq = priceData.seq;
    Object.assign(localPrices, priceData.prices);

    // Stats bar
    const conns  = Object.values(updData.connections);
    const connOk = conns.filter(s => s.startsWith("Connected")).length;
    document.getElementById("count").textContent       = updData.ticker_count.toLocaleString();
    document.getElementById("trade-count").textContent = updData.trade_count.toLocaleString();
    document.getElementById("conns").textContent       = `${connOk}/${conns.length} active`;
    document.getElementById("pairs").textContent       = priceData.pair_count.toLocaleString();
    document.getElementById("changed").textContent     = priceData.changed.toLocaleString();

    // Snapshot tab — render from merged local copy, sorted alphabetically
    if (activeTab === "snapshot") {
      const entries = Object.entries(localPrices).sort(([a], [b]) => a.localeCompare(b));
      document.getElementById("snapshot").innerHTML = entries.map(([pair, p]) => `<tr>
        <td class="pair">${pair}</td>
        <td class="bid">${fmt(p.bid)}</td>
        <td class="ask">${fmt(p.ask)}</td>
        <td class="mid">${fmt(p.mid)}</td>
        <td class="last">${fmt(p.last)}</td>
        <td class="spread">${p.spread_pct ?? "—"}%</td>
      </tr>`).join("");
    }

    // Stream tab — executed trades, newest first, with buy/sell + whale flags
    if (activeTab === "stream") {
      document.getElementById("stream").innerHTML = tradeData.trades.map(t => {
        const rowClass  = t.whale ? "whale-row" : "";
        const whaleBadge = t.whale ? '<span class="whale-badge">🐋</span>' : "";
        const timeStr   = new Date(t.time * 1000).toLocaleTimeString();
        return `<tr class="${rowClass}">
          <td class="pair">${t.pair}${whaleBadge}</td>
          <td class="${t.side}">${t.side.toUpperCase()}</td>
          <td class="mid">${fmt(t.price)}</td>
          <td class="notional">${parseFloat(t.volume).toFixed(6)}</td>
          <td class="notional">${fmtNotional(t.notional)}</td>
          <td class="spread">${timeStr}</td>
        </tr>`;
      }).join("");
    }

  } catch (e) {
    document.getElementById("count").textContent = "waiting for server...";
  }
}

setInterval(poll, 500);
poll();
</script>

</body>
</html>
