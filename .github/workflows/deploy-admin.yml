name: Deploy Admin to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - ".github/workflows/deploy-admin.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: crypto-admin
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/crypto-admin

jobs:
  deploy:
    name: Build & Deploy Next.js Admin
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud credentials
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        working-directory: admin
        run: |
          docker build \
            --tag $IMAGE:${{ github.sha }} \
            --tag $IMAGE:latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --no-allow-unauthenticated \
            --set-env-vars="REDIS_URL=${{ secrets.REDIS_URL }},DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --quiet
