name: Deploy Admin to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - ".github/workflows/deploy-admin.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: crypto-admin
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/crypto-admin

# Allow parallel deployments
concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Next.js Admin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for rollback capabilities

      # Authenticate using Service Account Key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud credentials
        run: gcloud auth configure-docker --quiet

      # Set up Docker Buildx for better caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        working-directory: admin
        run: |
          # Build with cache optimization and multiple tags
          docker buildx build \
            --cache-from type=registry,ref=$IMAGE:buildcache \
            --cache-to type=registry,ref=$IMAGE:buildcache,mode=max \
            --tag $IMAGE:${{ github.sha }} \
            --tag $IMAGE:latest \
            --push \
            --platform linux/amd64 \
            .

      - name: Deploy to Cloud Run with Rollback Support
        run: |
          # Deploy new revision
          gcloud run deploy $SERVICE \
            --image $IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --no-allow-unauthenticated \
            --no-traffic \
            --tag sha-${{ github.sha }} \
            --quiet
          
          # Gradually shift traffic to new revision
          gcloud run services update-traffic $SERVICE \
            --region $REGION \
            --to-revisions sha-${{ github.sha }}=100 \
            --quiet
          
          echo "Deployed admin with rollback capability. Use the following to rollback:"
          echo "gcloud run services update-traffic $SERVICE --region $REGION --to-revisions LATEST=100"
