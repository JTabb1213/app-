name: Deploy Admin to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - ".github/workflows/deploy-admin.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY_REGION: us-central1
  REGISTRY_NAME: docker-repo
  SERVICE: crypto-admin
  IMAGE: ${{ secrets.GCP_PROJECT_ID }}-docker-repo

# Allow parallel deployments
concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Next.js Admin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for rollback capabilities

      # Authenticate using Service Account Key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud credentials
        run: |
          gcloud auth configure-docker $REGISTRY_REGION-docker.pkg.dev --quiet

      # Set up Docker Buildx for better caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        working-directory: admin
        env:
          FULL_IMAGE: ${{ env.REGISTRY_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REGISTRY_NAME }}/${{ env.SERVICE }}
        run: |
          # Build with cache optimization and multiple tags
          docker buildx build \
            --cache-from type=registry,ref=$FULL_IMAGE:buildcache \
            --cache-to type=registry,ref=$FULL_IMAGE:buildcache,mode=max \
            --tag $FULL_IMAGE:${{ github.sha }} \
            --tag $FULL_IMAGE:latest \
            --push \
            --platform linux/amd64 \
            .

      - name: Deploy to Cloud Run with Rollback Support
        env:
          FULL_IMAGE: ${{ env.REGISTRY_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REGISTRY_NAME }}/${{ env.SERVICE }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA=${SHORT_SHA:0:8}
          
          # Deploy new revision
          gcloud run deploy $SERVICE \
            --image $FULL_IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --tag sha-$SHORT_SHA \
            --quiet
          
          # Set traffic to new revision for existing services
          gcloud run services update-traffic $SERVICE \
            --region $REGION \
            --to-revisions sha-$SHORT_SHA=100 \
            --quiet 2>/dev/null || true
          
          echo "Deployed admin with rollback capability. Use the following to rollback:"
          echo "gcloud run services update-traffic $SERVICE --region $REGION --to-revisions LATEST=100"
