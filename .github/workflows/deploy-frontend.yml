name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

# Allow parallel deployments
concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Vite React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for rollback capabilities

      # Authenticate using Service Account Key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # The Vite app reads this to know where the backend lives in production
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          # Add build timestamp for cache busting
          VITE_BUILD_TIME: ${{ github.run_number }}
          VITE_BUILD_SHA: ${{ github.sha }}
        run: npm run build

      - name: Deploy to Firebase Hosting with Rollback Support
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
          entryPoint: frontend
        
      - name: Show Rollback Information
        run: |
          echo "Frontend deployed successfully with rollback capability."
          echo "To rollback, use Firebase Console or:"
          echo "firebase hosting:clone SOURCE_SITE_ID:SOURCE_CHANNEL_ID TARGET_SITE_ID:live"
